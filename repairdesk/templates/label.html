<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Label {{ r.repair_number }}</title>
  <style>
    :root { --mono: ui-monospace,"SF Mono",Menlo,monospace; --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    * { box-sizing: border-box; }
    body { font-family: var(--sans); margin: 0; background:#eceae4; }
    .sheet { display:flex; flex-direction:column; align-items:center; gap:14px; padding:30px; }
    .label {
      width: 2.25in; padding: 10px 12px; background:#fff; color:#000;
      border: 1px dashed #999; border-radius: 6px; text-align:center;
    }
    .label .shop { font-size: 9px; letter-spacing:.08em; text-transform:uppercase; color:#555; }
    .label .num { font-family: var(--mono); font-weight:700; font-size: 15px; margin: 2px 0 6px; }
    .label .who { font-size: 11px; margin-bottom: 8px; }
    .label .who b { font-size:12px; }
    .label img.qr { width: 1.25in; height: 1.25in; image-rendering: pixelated; }
    .label img.bar { width: 100%; margin-top: 6px; }
    .toolbar { padding: 14px; }
    .btn { font-family:var(--sans); background:#2d52e0; color:#fff; border:0; border-radius:8px; padding:9px 16px; font-size:14px; cursor:pointer; }
    @media print {
      body { background:#fff; }
      .toolbar { display:none; }
      .sheet { padding:0; }
      .label { border:none; }
      @page { margin: 6mm; }
    }
  </style>
</head>
<body>
  <div class="toolbar"><button class="btn" onclick="window.print()">⎙ Print this label</button></div>
  <div class="sheet">
    <div class="label">
      <div class="shop">{{ shop_name }}</div>
      <div class="num">{{ r.repair_number }}</div>
      <div class="who"><b>{{ r.last_name }}</b>{% if r.device %} · {{ r.device }}{% endif %}</div>
      <img class="qr" src="{{ url_for('qr_image', token=r.public_token) }}" alt="QR">
      <img class="bar" src="{{ url_for('barcode_image', number=r.repair_number) }}" alt="barcode">
    </div>
  </div>
</body>
</html>
